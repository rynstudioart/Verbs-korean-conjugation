<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Grammar Table</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
body { font-family: 'Noto Sans KR', sans-serif; }
</style>
</head>

<body class="h-full bg-gradient-to-br from-pink-50 via-rose-50 to-amber-50 flex items-center justify-center p-6 overflow-auto">
<main class="w-full max-w-2xl">
<div class="bg-white rounded-2xl shadow-2xl border-2 border-rose-200 p-8">

<table class="w-full border-collapse">
<tbody>

<tr>
<td class="border-2 border-rose-300 p-6 text-center bg-yellow-100 w-1/2">
<input id="verbInput" type="text" placeholder="크다"
class="w-full px-4 py-3 text-2xl font-bold text-center border-2 border-yellow-300 rounded-lg">
</td>

<td class="border-2 border-rose-300 p-6 text-center bg-purple-100 w-1/2">
<select id="endingSelect"
class="w-full px-4 py-3 text-2xl font-bold text-center border-2 border-purple-300 rounded-lg">
<option value="present">요 (Present)</option>
<option value="past">았어요 / 었어요 (Past)</option>
<option value="future">ㄹ 거예요 / 을 거예요 (Future)</option>
</select>
</td>
</tr>

<tr>
<td class="border-2 border-rose-300 p-6 text-center bg-amber-100">
<select id="ruleSelect"
class="w-full px-4 py-3 text-xl font-bold text-center border-2 border-amber-300 rounded-lg">
</select>
</td>

<td class="border-2 border-rose-300 p-6 bg-emerald-100">
<div id="ruleDisplay"
class="text-lg font-bold text-emerald-700 leading-relaxed">
-
</div>
</td>
</tr>
</tbody>
</table>

<div class="mt-6 border-2 border-purple-300 p-6 text-center bg-purple-100 rounded-xl">
<div id="finalResult" class="text-4xl font-bold text-purple-700">-</div>
</div>

</div>
</main>

<script>
const verbInput = document.getElementById("verbInput");
const ruleSelect = document.getElementById("ruleSelect");
const endingSelect = document.getElementById("endingSelect");
const finalResult = document.getElementById("finalResult");
const ruleDisplay = document.getElementById("ruleDisplay");

verbInput.addEventListener("input", update);
ruleSelect.addEventListener("change", update);
endingSelect.addEventListener("change", updateRulesByEnding);

function updateRulesByEnding() {
const tense = endingSelect.value;

if (tense === "present") {
ruleSelect.innerHTML = `
<option value="">Select rule</option>
<option value="general">General</option>
<option value="ou">ㅗ / ㅜ combine</option>
<option value="i">ㅣ → ㅕ</option>
<option value="eu">ㅡ drop</option>
<option value="hada">하다</option>
<option value="b">ㅂ irregular</option>
<option value="d">ㄷ irregular</option>
<option value="reu">르 irregular</option>
<option value="s">ㅅ irregular</option>
<option value="h">ㅎ irregular</option>`;
}

if (tense === "past") {
ruleSelect.innerHTML = `
<option value="">Select rule</option>
<option value="general">General</option>
<option value="eu">ㅡ drop</option>
<option value="hada">하다</option>
<option value="b">ㅂ irregular</option>
<option value="d">ㄷ irregular</option>
<option value="reu">르 irregular</option>
<option value="s">ㅅ irregular</option>
<option value="h">ㅎ irregular</option>`;
}

if (tense === "future") {
ruleSelect.innerHTML = `
<option value="">Select rule</option>
<option value="general">Regular</option>
<option value="b">ㅂ irregular</option>
<option value="d">ㄷ irregular</option>
<option value="reu">르 irregular</option>
<option value="s">ㅅ irregular</option>`;
}

update();
}

function getHangulParts(char){
const base = char.charCodeAt(0) - 0xAC00;
return {
initial: Math.floor(base/588),
medial: Math.floor((base%588)/28),
final: base%28
};
}

function buildHangul(initial, medial, final=0){
return String.fromCharCode(0xAC00 + (initial*588) + (medial*28) + final);
}

function update(){

const verb = verbInput.value.trim();
const tense = endingSelect.value;

if (!verb.endsWith("다")){
finalResult.textContent="-";
ruleDisplay.innerHTML="-";
return;
}

let stem = verb.slice(0,-1);
let last = stem[stem.length-1];
let parts = getHangulParts(last);

function hasBatchim(p){ return p.final !== 0; }
function isL(p){ return p.final === 8; }      // ㄹ
function isB(p){ return p.final === 17; }     // ㅂ
function isD(p){ return p.final === 7; }      // ㄷ
function isS(p){ return p.final === 19; }     // ㅅ
function isH(p){ return p.final === 27; }     // ㅎ
function isEu(p){ return p.medial === 18; }   // ㅡ

// REAL ㅂ irregular list
const bIrregulars = ["돕다","곱다","춥다","덥다","어렵다","무겁다","더럽다","맵다","쉽다","귀엽다","아름답다"];

let result = "";

/* ================= PRESENT ================= */

if(tense==="present"){

// 하다
if(verb==="하다"){
result = "해요";
}

// ㅂ irregular
else if(bIrregulars.includes(verb) && isB(parts)){
let base = buildHangul(parts.initial, parts.medial, 0);
if(parts.medial===8) result = stem.slice(0,-1)+base+"와요";
else result = stem.slice(0,-1)+base+"워요";
}

// ㄷ irregular
else if(isD(parts)){
let base = buildHangul(parts.initial, parts.medial, 8);
result = stem.slice(0,-1)+base+"어요";
}

// ㅅ irregular
else if(isS(parts)){
let base = buildHangul(parts.initial, parts.medial, 0);
result = stem.slice(0,-1)+base+"어요";
}

// 르 irregular
else if(stem.endsWith("르")){
let prev = stem[stem.length-2];
let p = getHangulParts(prev);
let newPrev = buildHangul(p.initial, p.medial, 8);
let vowel = (p.medial===0||p.medial===8)?"라요":"러요";
result = stem.slice(0,-2)+newPrev+vowel;
}

// ㅎ irregular (adjectives)
else if(isH(parts)){
let base = buildHangul(parts.initial, parts.medial, 0);
result = stem.slice(0,-1)+base+"해요";
}

// ㅡ drop
else if(isEu(parts)){
let prev = stem[stem.length-2];
let p = getHangulParts(prev);
let newVowel = (p.medial===0||p.medial===8)?0:4;
let base = buildHangul(parts.initial,newVowel,parts.final);
result = stem.slice(0,-1)+base+"요";
}

// General
else{
if(hasBatchim(parts)) result = stem+"어요";
else{
let newVowel=(parts.medial===0||parts.medial===8)?0:4;
let base=buildHangul(parts.initial,newVowel,0);
result=stem.slice(0,-1)+base+"요";
}
}

}

/* ================= PAST ================= */

if(tense==="past"){

if(verb==="하다"){
result="했어요";
}

else if(stem.endsWith("르")){
let prev = stem[stem.length-2];
let p = getHangulParts(prev);
let newPrev = buildHangul(p.initial, p.medial, 8);
let vowel = (p.medial===0||p.medial===8)?"랐어요":"렀어요";
result = stem.slice(0,-2)+newPrev+vowel;
}

else{
if(hasBatchim(parts)) result=stem+"었어요";
else{
let newVowel=(parts.medial===0||parts.medial===8)?0:4;
let base=buildHangul(parts.initial,newVowel,20);
result=stem.slice(0,-1)+base+"어요";
}
}

}

/* ================= FUTURE ================= */

if(tense==="future"){

if(verb==="하다"){
result="할 거예요";
}

else if(!hasBatchim(parts)){
result=stem+"ㄹ 거예요";
}
else if(isL(parts)){
let base=buildHangul(parts.initial,parts.medial,0);
result=stem.slice(0,-1)+base+"ㄹ 거예요";
}
else{
result=stem+"을 거예요";
}

}

finalResult.textContent=result;
ruleDisplay.innerHTML="Auto rule applied";

}

updateRulesByEnding();
</script>

</body>
</html>
